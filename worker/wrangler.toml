name = "nuvho-proposal-worker"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "nuvho-proposals"
database_id = "7c222efc-d384-4132-868b-ebcea31b4fa4"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "nuvho-proposals"

[[kv_namespaces]]
binding = "SESSIONS"
id = "2f5941731df8409587401ec304767a50"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "220309ed7fd04db499e6301cf0ce3a93"

[vars]
FRONTEND_URL = "https://proposals.nuvho.com"
AZURE_TENANT_ID = "15723413-cb5d-453c-bb72-3f481241aeff"
AZURE_CLIENT_ID = "f5f35997-177f-4f24-9069-cc1f31113ae7"
ASANA_WORKSPACE_GID = "1143618526084997"
REGISTRY_BASE_URL = "https://register.nuvho.com"

# Secrets — set via `wrangler secret put <NAME>`, never committed here:
#   AZURE_CLIENT_SECRET, HUBSPOT_API_KEY, ASANA_PAT, JWT_SECRET,
#   RESEND_API_KEY, XERO_CLIENT_ID, XERO_CLIENT_SECRET, ANTHROPIC_API_KEY,
#   REGISTRY_API_KEY  — Nuvho Master Registry X-Registry-Key (register.nuvho.com)

[[routes]]
pattern = "proposals-api.nuvho.com/*"
zone_name = "nuvho.com"

[dev]
port = 8787
